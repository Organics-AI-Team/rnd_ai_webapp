version: '3.8'

# R&D AI Management - Docker Compose Configuration
# This file allows you to run both web and AI services together locally

services:
  # Web Frontend Application
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: rnd-ai-web
    mem_limit: 768m
    ports:
      - "3000:3000"
    environment:
      # Database
      - MONGODB_URI=${MONGODB_URI}
      - RAW_MATERIALS_REAL_STOCK_MONGODB_URI=${RAW_MATERIALS_REAL_STOCK_MONGODB_URI}

      # AI Service URL (connects to ai service container)
      - AI_SERVICE_URL=http://ai:3001

      # API Keys
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}

      # Public Variables
      - NEXT_PUBLIC_GEMINI_API_KEY=${NEXT_PUBLIC_GEMINI_API_KEY}
      - NEXT_PUBLIC_OPENAI_API_KEY=${NEXT_PUBLIC_OPENAI_API_KEY}
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api

      # Admin
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}

      # Node Environment
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1

    depends_on:
      - ai
      - qdrant

    networks:
      - rnd-ai-network

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # AI Backend Service
  ai:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: rnd-ai-service
    mem_limit: 768m
    ports:
      - "3001:3001"
    environment:
      # Database
      - MONGODB_URI=${MONGODB_URI}
      - RAW_MATERIALS_REAL_STOCK_MONGODB_URI=${RAW_MATERIALS_REAL_STOCK_MONGODB_URI}

      # AI APIs
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}

      # Vector Database
      - QDRANT_URL=http://qdrant:6333

      # Service Configuration
      - AI_SERVICE_PORT=3001
      - WEB_APP_URL=http://web:3000

      # Node Environment
      - NODE_ENV=production

    depends_on:
      qdrant:
        condition: service_healthy

    networks:
      - rnd-ai-network

    restart: unless-stopped

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rnd-ai-qdrant
    mem_limit: 512m
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    environment:
      - QDRANT__STORAGE__ON_DISK_PAYLOAD=true
      - QDRANT__STORAGE__OPTIMIZERS__MEMMAP_THRESHOLD_KB=20000
      - QDRANT__SERVICE__GRPC_PORT=6334
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - rnd-ai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  rnd-ai-network:
    driver: bridge
    name: rnd-ai-network

volumes:
  qdrant-data:
    driver: local
    name: rnd-ai-qdrant-data

# Usage:
# ------
# 1. Copy .env.example to .env and fill in your values
# 2. Build and start all services:
#    docker-compose up -d
#
# 3. View logs:
#    docker-compose logs -f web
#    docker-compose logs -f ai
#    docker-compose logs -f qdrant
#
# 4. Stop all services:
#    docker-compose down
#
# 5. Stop and remove volumes:
#    docker-compose down -v
#
# 6. Rebuild after code changes:
#    docker-compose up -d --build
#
# Access:
# -------
# Web App: http://localhost:3000
# AI Service: http://localhost:3001
# Qdrant: http://localhost:6333
# Qdrant gRPC: http://localhost:6334
